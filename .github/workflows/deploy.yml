name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }} # Recommended to avoid concurrent deployments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Disable npm cache to avoid issues with missing lock file
          # (Removes setup-node's default package-lock.json dependency)

      - name: Install Dependencies 🔧
        run: npm install

      - name: Build Application 🏗️
        run: npm run build

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder the build script generates
          branch: gh-pages # The branch the action should deploy to
          clean: true
